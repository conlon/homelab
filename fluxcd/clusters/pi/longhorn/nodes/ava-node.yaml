---
apiVersion: longhorn.io/v1beta2
kind: Node
metadata:
  name: ava
  namespace: longhorn-system
spec:
  allowScheduling: true
  disks:
    default-disk:
      allowScheduling: true
      diskType: filesystem
      path: /mnt/longhorn
      storageReserved: 42048102400  # 39.2 GiB reserved (20% of ~196 GiB)
      tags: []
  tags:
    - vm
