---
apiVersion: longhorn.io/v1beta2
kind: Node
metadata:
  name: ava
  namespace: longhorn-system
spec:
  allowScheduling: true
  disks:
    default-disk:
      allowScheduling: true
      diskType: filesystem
      evictionRequested: false
      path: /mnt/longhorn
      storageReserved: 536870912  # 512MB reserved (10% of ~5GB minimum)
      tags: []
  tags:
    - vm
