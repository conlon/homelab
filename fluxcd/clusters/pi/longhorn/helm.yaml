---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 24h
  url: https://charts.longhorn.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 5m
  chart:
    spec:
      chart: longhorn
      version: '1.6.4'
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
      interval: 24h
  values:
    defaultSettings:
      backupTarget: s3://longhorn-recovery@us-east-1/
      backupTargetCredentialSecret: minio-secret
      storageReservedPercentageForDefaultDisk: 10
      defaultDataLocality: best-effort
      defaultReplicaCount: 2
      # Refuse to create/attach a volume unless its full replica count can be
      # satisfied — prevents half-born volumes with robustness:unknown.
      allowVolumeCreationWithDegradedAvailability: false
      # Keep the safest drain policy: evict every replica before completing a drain.
      nodeDrainPolicy: block-for-eviction
      # Proactively spread replicas across nodes (least-effort only acts on empty nodes).
      replicaAutoBalance: best-effort
      # Gentler rebuilds to avoid I/O storms on slower nodes.
      concurrentReplicaRebuildPerNodeLimit: 2
      # Lock in safety settings so live patches can't drift.
      replicaSoftAntiAffinity: false
      autoSalvage: true
      snapshotDataIntegrity: fast-check
      disableRevisionCounter: false
      taintTolerations:
        - effect: NoSchedule
          key: vm
          operator: "Equal"
          value: "true"
    longhornManager:
      tolerations:
        - effect: NoSchedule
          key: vm
          operator: "Equal"
          value: "true"
    longhornDriver:
      tolerations:
        - effect: NoSchedule
          key: vm
          operator: "Equal"
          value: "true"
