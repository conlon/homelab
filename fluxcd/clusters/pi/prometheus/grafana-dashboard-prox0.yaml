apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-prox0
  namespace: prometheus
  labels:
    grafana_dashboard: "1"
data:
  prox0-hdd-fans.json: |
    {
      "annotations": {"list": []},
      "description": "prox0 HDD temperatures, computed fan duty, and BMC fan RPMs",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineInterpolation": "smooth", "showPoints": "never"},
              "unit": "celsius"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0},
          "id": 5,
          "options": {"legend": {"calcs": [], "displayMode": "list", "placement": "bottom"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "node_hwmon_temp_celsius{job=\"prox0-node\"}",
              "legendFormat": "{{chip}} {{sensor}}",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "bmc_temp_celsius{job=\"prox0-node\", sensor=\"CPU0_TEMP\"}",
              "legendFormat": "BMC CPU0_TEMP",
              "refId": "B"
            }
          ],
          "title": "CPU Temperature",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineInterpolation": "smooth", "showPoints": "never"},
              "unit": "rotrpm"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8},
          "id": 4,
          "options": {"legend": {"calcs": [], "displayMode": "list", "placement": "bottom"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "bmc_fan_rpm{job=\"prox0-node\", fan=~\"CPU0_FAN|SYS_FAN[12]\"}",
              "legendFormat": "{{fan}}",
              "refId": "A"
            }
          ],
          "title": "CPU Fan RPM (CPU0_FAN / SYS_FAN1/2)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "lineInterpolation": "smooth",
                "showPoints": "never",
                "fillOpacity": 10,
                "stacking": {"mode": "normal", "group": "A"}
              },
              "min": 0,
              "softMax": 0.5,
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16},
          "id": 6,
          "options": {"legend": {"calcs": [], "displayMode": "list", "placement": "bottom"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "avg by(mode) (rate(node_cpu_seconds_total{job=\"prox0-node\", mode!=\"idle\"}[5m]))",
              "legendFormat": "{{mode}}",
              "refId": "A"
            }
          ],
          "title": "CPU Activity",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "lineInterpolation": "smooth",
                "showPoints": "never",
                "thresholdsStyle": {"mode": "dashed"}
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 40},
                  {"color": "orange", "value": 46},
                  {"color": "red", "value": 51}
                ]
              },
              "softMin": 30,
              "softMax": 50,
              "unit": "celsius"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 24},
          "id": 1,
          "options": {"legend": {"calcs": [], "displayMode": "list", "placement": "bottom"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "hdd_temperature_celsius{job=\"prox0-node\"}",
              "legendFormat": "{{drive}} {{serial}}",
              "refId": "A"
            }
          ],
          "title": "HDD Temperatures",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineInterpolation": "smooth", "showPoints": "never"},
              "max": 100,
              "min": 0,
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 32},
          "id": 2,
          "options": {"legend": {"calcs": [], "displayMode": "list", "placement": "bottom"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "hdd_fan_duty_percent{job=\"prox0-node\"}",
              "legendFormat": "Duty %",
              "refId": "A"
            }
          ],
          "title": "HDD Fan Duty %",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineInterpolation": "smooth", "showPoints": "never"},
              "unit": "rotrpm"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 40},
          "id": 3,
          "options": {"legend": {"calcs": [], "displayMode": "list", "placement": "bottom"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "bmc_fan_rpm{job=\"prox0-node\", fan=~\"SYS_FAN[345]\"}",
              "legendFormat": "{{fan}}",
              "refId": "A"
            }
          ],
          "title": "Drive Fan RPM (SYS_FAN3/4/5)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "lineInterpolation": "smooth",
                "showPoints": "never",
                "fillOpacity": 5
              },
              "unit": "binBps"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 48},
          "id": 7,
          "options": {"legend": {"calcs": [], "displayMode": "list", "placement": "bottom"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "rate(node_disk_read_bytes_total{job=\"prox0-node\", device=~\"sd[a-z]\"}[5m])",
              "legendFormat": "{{device}} read",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "-rate(node_disk_written_bytes_total{job=\"prox0-node\", device=~\"sd[a-z]\"}[5m])",
              "legendFormat": "{{device}} write",
              "refId": "B"
            }
          ],
          "title": "HDD Read/Write Activity",
          "type": "timeseries"
        }
      ],
      "refresh": "1m",
      "schemaVersion": 38,
      "tags": ["prox0", "hardware"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource",
            "label": "Datasource"
          }
        ]
      },
      "time": {"from": "now-3h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "prox0 — HDD Fans & Temps",
      "uid": "prox0-hdd-fans",
      "version": 1
    }
