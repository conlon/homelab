apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-k3s-hosts
  namespace: prometheus
  labels:
    grafana_dashboard: "1"
data:
  k3s-host-hardware.json: |
    {
      "annotations": {"list": []},
      "description": "CPU/SoC and drive temperatures for the physical k3s hosts (Pis k0-k5 + Proxmox hosts prox0/prox1). Created after the June 2026 thermal outage.",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "orange", "value": 80},
                  {"color": "red", "value": 85}
                ]
              },
              "unit": "celsius"
            },
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "node_thermal_zone_temp * on(instance) group_left(nodename) node_uname_info",
              "legendFormat": "{{nodename}}",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "node_hwmon_temp_celsius{job=~\"prox.-node\", chip=~\".*coretemp.*|.*k10temp.*\"}",
              "legendFormat": "{{host}} {{sensor}}",
              "refId": "B"
            }
          ],
          "title": "Current CPU / SoC Temperature",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 55},
                  {"color": "orange", "value": 60},
                  {"color": "red", "value": 70}
                ]
              },
              "unit": "celsius"
            },
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "hdd_temperature_celsius",
              "legendFormat": "{{node}}{{host}} {{drive}}",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "node_hwmon_temp_celsius{job=\"prox1-node\", chip=~\".*nvme.*\"}",
              "legendFormat": "{{host}} nvme {{sensor}}",
              "refId": "B"
            }
          ],
          "title": "Current Drive Temperature",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "lineInterpolation": "smooth",
                "showPoints": "never",
                "thresholdsStyle": {"mode": "dashed"}
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "orange", "value": 80},
                  {"color": "red", "value": 85}
                ]
              },
              "softMin": 30,
              "softMax": 90,
              "unit": "celsius"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 6},
          "id": 3,
          "options": {"legend": {"calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "right"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "node_thermal_zone_temp * on(instance) group_left(nodename) node_uname_info",
              "legendFormat": "{{nodename}} (SoC)",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "node_hwmon_temp_celsius{job=~\"prox.-node\", chip=~\".*coretemp.*|.*k10temp.*\"}",
              "legendFormat": "{{host}} {{sensor}}",
              "refId": "B"
            }
          ],
          "title": "CPU / SoC Temperature",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "lineInterpolation": "smooth",
                "showPoints": "never",
                "thresholdsStyle": {"mode": "dashed"}
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 55},
                  {"color": "orange", "value": 60},
                  {"color": "red", "value": 70}
                ]
              },
              "softMin": 25,
              "softMax": 75,
              "unit": "celsius"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 15},
          "id": 4,
          "options": {"legend": {"calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "right"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "hdd_temperature_celsius",
              "legendFormat": "{{node}}{{host}} {{drive}}",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "node_hwmon_temp_celsius{job=\"prox1-node\", chip=~\".*nvme.*\"}",
              "legendFormat": "{{host}} nvme {{sensor}}",
              "refId": "B"
            }
          ],
          "title": "Drive Temperature",
          "type": "timeseries"
        }
      ],
      "refresh": "1m",
      "schemaVersion": 38,
      "tags": ["k3s", "hardware"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource",
            "label": "Datasource"
          }
        ]
      },
      "time": {"from": "now-6h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "k3s Hosts — CPU & Drive Temps",
      "uid": "k3s-host-hardware",
      "version": 1
    }
