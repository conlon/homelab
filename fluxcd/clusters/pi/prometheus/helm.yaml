---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: prometheus
spec:
  interval: 24h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: prometheus
spec:
  interval: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: '56.8.2'
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: prometheus
      interval: 24h
  values:
    # k3s bundles controller-manager, scheduler, and proxy into the k3s
    # binary — no separate pods exist to scrape. Node-level alerts
    # (KubeNodeNotReady, KubeNodeUnreachable) cover control-plane failures.
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
    tolerations:
      - effect: NoSchedule
        key: vm
        operator: "Equal"
        value: "true"
    alertmanager:
      alertmanagerSpec:
        configSecret: alertmanager-discord
    # The node-exporter DaemonSet runs on every k3s node. Mount the host textfile
    # collector dir so the Pi disk-temp-exporter metrics (hdd_temperature_celsius,
    # written by ansible — USB-SAT SSD temps aren't visible via hwmon) are picked
    # up on its existing scrape. The hostPath is harmlessly empty on non-Pi nodes.
    prometheus-node-exporter:
      extraArgs:
        - --collector.textfile.directory=/host/textfile
      extraHostVolumeMounts:
        - name: textfile
          hostPath: /var/lib/node_exporter/textfile_collector
          mountPath: /host/textfile
          readOnly: true
    prometheus:
      prometheusSpec:
        # Persist the TSDB on Longhorn (3 replicas via the longhorn storageclass)
        # so history survives pod restarts and node loss — it was emptyDir before,
        # so every reschedule wiped all history. Pinned to `longhorn` explicitly
        # because both local-path and longhorn are currently marked (default).
        retention: 30d
        retentionSize: "25GB"
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 30Gi
        additionalScrapeConfigs:
          - job_name: prox0-node
            static_configs:
              - targets:
                  - 192.168.86.4:9100
                labels:
                  instance: prox0
                  host: prox0
          # prox1 hosts the n0-n2 VM k3s nodes. node-exporter (installed via
          # ansible) exposes its CPU coretemp and NVMe temp through node_hwmon_temp_celsius.
          - job_name: prox1-node
            static_configs:
              - targets:
                  - 192.168.86.6:9100
                labels:
                  instance: prox1
                  host: prox1
