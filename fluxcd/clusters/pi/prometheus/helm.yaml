---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: prometheus
spec:
  interval: 24h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: prometheus
spec:
  interval: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: '56.8.2'
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: prometheus
      interval: 24h
  values:
    # k3s bundles controller-manager, scheduler, and proxy into the k3s
    # binary — no separate pods exist to scrape. Node-level alerts
    # (KubeNodeNotReady, KubeNodeUnreachable) cover control-plane failures.
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
    tolerations:
      - effect: NoSchedule
        key: vm
        operator: "Equal"
        value: "true"
    alertmanager:
      alertmanagerSpec:
        configSecret: alertmanager-discord
    prometheus:
      prometheusSpec:
        additionalScrapeConfigs:
          - job_name: prox0-node
            static_configs:
              - targets:
                  - 192.168.86.4:9100
                labels:
                  instance: prox0
                  host: prox0
