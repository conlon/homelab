---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: n8n
  namespace: home
  labels:
    app: n8n
spec:
  serviceName: n8n
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      name: n8n
      namespace: home
      labels:
        app: n8n
    spec:
      terminationGracePeriodSeconds: 120
      securityContext:
        fsGroup: 1000
      containers:
        - name: n8n
          image: n8nio/n8n:latest
          ports:
            - containerPort: 5678
              name: n8n-port
          env:
            - name: N8N_HOST
              value: "n8n.local.fellowfreak.dev"
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: "https"
            - name: WEBHOOK_URL
              value: "https://n8n.local.fellowfreak.dev/"
            - name: GENERIC_TIMEZONE
              value: "America/Chicago"
            - name: TZ
              value: "America/Chicago"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1024"
            # Must be the literal string "false"; n8n blocks $env in
            # expressions unless this exactly equals "false".
            - name: N8N_BLOCK_ENV_ACCESS_IN_NODE
              value: "false"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: n8n-telegram-bot-token
                  key: token
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1500Mi"
              cpu: "1000m"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
  volumeClaimTemplates:
    - metadata:
        name: n8n-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 5Gi
