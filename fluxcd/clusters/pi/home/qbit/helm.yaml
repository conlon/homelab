---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbit
  namespace: home
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: "3.x"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: home
      interval: 24h
  values:
    controllers:
      main:
        type: statefulset
        pod:
          securityContext:
            fsGroup: 1000

        # gluetun as a native sidecar (k8s 1.28+): restartPolicy: Always means it starts
        # before main containers and stays running. qBit's readiness probe on gluetun's
        # port 8000 gates qBit startup, ensuring tun0 exists when qBit initialises its
        # listen sockets. This eliminates the need for DNAT or routing table workarounds.
        initContainers:
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
            restartPolicy: Always
            securityContext:
              capabilities:
                add: ["NET_ADMIN"]
            env:
              VPN_SERVICE_PROVIDER: protonvpn
              VPN_TYPE: wireguard
              SERVER_CITIES: "Dallas"
              VPN_PORT_FORWARDING: "on"
              FIREWALL_OUTBOUND_SUBNETS: "10.42.0.0/16,10.43.0.0/16"
              FIREWALL_INPUT_PORTS: "8080"
              HEALTH_TARGET_ADDRESS: "1.1.1.1:443"
              UPDATER_PERIOD: "24h"
              WIREGUARD_PRIVATE_KEY:
                valueFrom:
                  secretKeyRef:
                    name: protonvpn-auth
                    key: WIREGUARD_PRIVATE_KEY
            resources:
              requests:
                memory: 64Mi
                cpu: 100m
              limits:
                memory: 384Mi
                cpu: 500m
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 18
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8000
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8000
                  initialDelaySeconds: 15
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 3

        containers:
          qbit:
            image:
              repository: lscr.io/linuxserver/qbittorrent
              tag: "5.0.3"
            env:
              PUID: "1000"
              PGID: "1000"
              TZ: America/Chicago
            resources:
              requests:
                memory: 512Mi
                cpu: 500m
              limits:
                memory: 2048Mi
                cpu: "1000m"
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 18
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3

          port-sync:
            image:
              repository: curlimages/curl
              tag: latest
            env:
              QBT_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: protonvpn-auth
                    key: QBT_USERNAME
              QBT_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: protonvpn-auth
                    key: QBT_PASSWORD
            command:
              - /bin/sh
              - -c
              - |
                while true; do
                  PORT=$(cat /tmp/gluetun/forwarded_port 2>/dev/null)
                  if [ -n "$PORT" ]; then
                    curl -sf -c /tmp/qbt-cookies.txt -X POST \
                      -d "username=${QBT_USERNAME}&password=${QBT_PASSWORD}" \
                      http://localhost:8080/api/v2/auth/login > /dev/null
                    curl -sf -b /tmp/qbt-cookies.txt -X POST \
                      -d "json={\"listen_port\":${PORT}}" \
                      http://localhost:8080/api/v2/app/setPreferences
                    echo "$(date -u): port set to ${PORT}"
                  else
                    echo "$(date -u): port not yet available"
                  fi
                  sleep 30
                done
            resources:
              requests:
                memory: 8Mi
                cpu: 5m
              limits:
                memory: 16Mi
                cpu: 50m

    service:
      main:
        controller: main
        ports:
          http:
            port: 80
            targetPort: 8080

    persistence:
      qbit-config:
        existingClaim: qbit-configs-qbit-0
        advancedMounts:
          main:
            qbit:
              - path: /config
      media:
        type: nfs
        server: 192.168.86.11
        path: /mnt/nas/media
        advancedMounts:
          main:
            qbit:
              - path: /media
      gluetun-tmp:
        type: emptyDir
        advancedMounts:
          main:
            gluetun:
              - path: /tmp/gluetun
            port-sync:
              - path: /tmp/gluetun
