---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prowlarr
  namespace: home
  labels:
    app: prowlarr
spec:
  serviceName: prowlarr
  replicas: 1
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      name: prowlarr
      namespace: home
      labels:
        app: prowlarr
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:1.37.0
          ports:
            - containerPort: 9696
              name: prowlarr-port
          envFrom:
            - configMapRef:
                name: common-configs
          resources:
            requests:
              memory: "300Mi"
              cpu: "100m"
            limits:
              memory: "300Mi"
              cpu: "300m"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sync; sleep 5"]
          volumeMounts:
            - name: prowlarr-configs
              mountPath: /config
  volumeClaimTemplates:
    - metadata:
        name: prowlarr-configs
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 200Mi
