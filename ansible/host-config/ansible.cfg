[defaults]
#roles_path = ./roles:~/git/k8s-pi-setup/roles/
hash_behaviour = merge

# Become password comes from ansible_become_pass in the sops-encrypted group_vars
# (decrypted by the community.sops.sops vars plugin); no interactive prompt needed.
become_ask_pass = False

inventory = ./inventory/

ansible_python_interpreter = auto_silent

# Facts are referenced via ansible_facts[...] (not auto-injected ansible_* vars).
inject_facts_as_vars = False

result_format = yaml
# Use the stdout_callback when running ad-hoc commands.
bin_ansible_callbacks = True

vars_plugins_enabled = host_group_vars,community.sops.sops
