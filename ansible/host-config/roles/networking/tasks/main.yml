- name: set resolv.conf
  template:
    src: resolv.j2
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: '0644'
  become: yes
  when: "'pi' in group_names"

- name: set dhcpcd.conf
  template:
    src: dhcpcd.j2
    dest: /etc/dhcpcd.conf
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: restart dhcpcd
  when: "'pi' in group_names"

- name: configure netplan
  template:
    src: netplan.j2
    dest: /etc/netplan/50-cloud-init.yaml
    owner: root
    group: root
    mode: '0600'
  become: yes
  notify: apply netplan
  when: "'vm' in group_names"

# arp_ignore=1: Only reply to ARP requests if the target IP address is configured on the incoming interface.
# arp_announce=2: Forces the kernel to use the correct IP/MAC pair for the interface the packet is actually leaving from.
- name: Prevent ARP Flux with two ethernet interfaces
  ansible.builtin.lineinfile:
    path: /etc/sysctl.conf
    line: "{{ item }}"
    create: yes
    mode: 0644
  become: yes
  with_items:
    - net.ipv4.conf.all.arp_ignore = 1
    - net.ipv4.conf.all.arp_announce = 2
    - net.ipv4.conf.default.arp_ignore = 1
    - net.ipv4.conf.default.arp_announce = 2
  when: "'proxmox' in group_names"
