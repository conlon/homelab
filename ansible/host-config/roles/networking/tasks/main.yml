# Pis run NetworkManager (migrated off Raspberry Pi OS / dhcpcd). Pin the static IP,
# gateway, and DNS on the existing "Wired connection 1" eth0 profile. Writing the
# profile is non-disruptive; it's applied by the `reboot pi` handler at end of play
# (which also picks up the cgroup cmdline change and reconnects at the node's new IP
# for a node mid-cutover). Router DHCP reservations back this up.
- name: Configure static networking on eth0 via NetworkManager
  community.general.nmcli:
    conn_name: "Wired connection 1"
    ifname: "{{ interface | default('eth0') }}"
    type: ethernet
    method4: manual
    ip4: "{{ permanent_host_ip }}/24"
    gw4: "{{ routers | first }}"
    dns4: "{{ nameservers }}"
    state: present
  become: yes
  notify: reboot pi
  when: "'pi' in group_names"

- name: configure netplan
  template:
    src: netplan.j2
    dest: /etc/netplan/50-cloud-init.yaml
    owner: root
    group: root
    mode: '0600'
  become: yes
  notify: apply netplan
  when: "'vm' in group_names"

# arp_ignore=1: Only reply to ARP requests if the target IP address is configured on the incoming interface.
# arp_announce=2: Forces the kernel to use the correct IP/MAC pair for the interface the packet is actually leaving from.
- name: Prevent ARP Flux with two ethernet interfaces
  ansible.builtin.lineinfile:
    path: /etc/sysctl.conf
    line: "{{ item }}"
    create: yes
    mode: 0644
  become: yes
  with_items:
    - net.ipv4.conf.all.arp_ignore = 1
    - net.ipv4.conf.all.arp_announce = 2
    - net.ipv4.conf.default.arp_ignore = 1
    - net.ipv4.conf.default.arp_announce = 2
  when: "'proxmox' in group_names"
