---
- name: install packages
  ansible.builtin.apt:
    pkg: "{{
      (default_packages +
      (packages | default([]))) |
      unique
    }}"
    state: latest
    update_cache: yes
    cache_valid_time: 86400  # 24 hours in seconds (60*60*24)
  become: yes

- name: Bash aliases | general aliases
  lineinfile:
    dest: "{{ ansible_facts['env']['HOME'] }}/.bash_aliases"
    create: yes
    mode: 0644
    line: 'alias {{ item.alias }}="{{ item.command }}"'
    regexp: "^alias {{ item.alias }}="
  with_items: "{{
    (default_aliases +
    (aliases | default([]))) |
    unique
  }}"

- name: Include aliases in bashrc
  lineinfile:
    dest: "{{ ansible_facts['env']['HOME'] }}/.bashrc"
    line: "source {{ ansible_facts['env']['HOME'] }}/.bash_aliases"

# https://connect.resilio.com/hc/en-us/articles/360011329820-Agent-run-out-of-system-notify-watchers
- name: Increase max_user_watches (for resilio sync). Default is 8192
  lineinfile:
    dest: /etc/sysctl.conf
    line: fs.inotify.max_user_watches=32768
  when:
    - "'worker' in group_names"
  become: yes

# - name: Include WOL tasks
#   ansible.builtin.include_tasks: wol.yml

- name: Add michael to sudoers with NOPASSWD
  lineinfile:
    path: /etc/sudoers.d/user
    line: 'michael    ALL=(ALL) NOPASSWD:ALL'
    create: yes
    mode: 0440
    validate: /usr/sbin/visudo -cf %s
  when:
    - "'vm' in group_names"
  become: yes

- name: Include Coral Edge TPU specific tasks
  ansible.builtin.include_tasks: coral.yml
  when: "'nuc' in group_names"

- name: Include HDD fan curve tasks (prox0 only)
  ansible.builtin.include_tasks: hdd-fan-curve.yml
  when: inventory_hostname == 'prox0'

- name: Include host node-exporter tasks (prox1 only)
  ansible.builtin.include_tasks:
    file: node-exporter.yml
    # apply: propagates the tag to the included child tasks so they're selected
    # when running with `--tags hardware-temps` (dynamic includes don't inherit it).
    apply:
      tags: hardware-temps
  when: inventory_hostname == 'prox1'
  tags: hardware-temps

- name: Include disk temp exporter tasks (Pi k3s nodes)
  ansible.builtin.include_tasks:
    file: disk-temp-exporter.yml
    apply:
      tags: hardware-temps
  when: "'pi' in group_names"
  tags: hardware-temps

- name: Include tfenv/terraform tasks (vm hosts)
  ansible.builtin.include_tasks: tfenv.yml
  when: "'vm' in group_names"
