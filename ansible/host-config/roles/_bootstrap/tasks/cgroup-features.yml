---
# k3s/kubelet needs the memory cgroup controller. On the Pi the controller is only
# exposed when the right flags are on the kernel cmdline (read only at boot — hence
# the `reboot pi` handler applies it). Two wrinkles on current images:
#   - Raspberry Pi OS now reports ansible_distribution=Debian, so this is gated on
#     the `pi` group (at the include site), not the distro string.
#   - Some newer images ship `cgroup_disable=memory`, which wins over an enable flag
#     and must be stripped first (this is why k1/k2 had no memory controller).
- name: Strip cgroup_disable=memory from kernel cmdline
  ansible.builtin.replace:
    path: /boot/firmware/cmdline.txt   # symlink target of the old /boot/cmdline.txt
    regexp: ' *cgroup_disable=memory'
    replace: ''
  become: yes
  notify: reboot pi

- name: Ensure cgroup controllers are enabled on the kernel cmdline
  ansible.builtin.replace:
    path: /boot/firmware/cmdline.txt
    # Append only when the memory controller isn't already enabled (idempotent),
    # robust to other args on the line (commas/semicolons in console=/ds= etc.).
    regexp: '^(?!.*cgroup_enable=memory)(.+?)\s*$'
    replace: '\1 cgroup_enable=cpuset cgroup_enable=memory cgroup_memory=1'
  become: yes
  notify: reboot pi
